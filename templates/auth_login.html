<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>로그인 | Edge Marker Racing</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

  <style>
    :root{
      --bg:#f7faf8; --ink:#0c1411; --muted:#50625a;
      --green:#0f3d2e; --green-dark:#0d3327; --chip:#e9f2ee;
      --border:#e3ece7; --gold:#c6971a; --shadow:0 18px 40px rgba(7,25,18,.10);
      --radius:16px; --brand-gap:18px;
    }
    /* 배경(사이트 톤 맞춤) */
    body{
      min-height:100vh; color:var(--ink);
      background:
        radial-gradient(1000px 400px at 10% -10%, rgba(25,120,90,.08), transparent 60%),
        radial-gradient(1000px 400px at 90% -10%, rgba(25,120,90,.08), transparent 60%),
        linear-gradient(180deg,#f7fbf8 0%, #f4faf6 70%, #f7fbf8 100%);
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
      font-family:"Noto Sans KR",system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    }
    /* 상단 네비 (index와 동일 정렬) */
    .topbar{
      background:linear-gradient(90deg, var(--green), var(--green-dark));
      border-bottom:1px solid rgba(255,255,255,.08);
      color:#fff; position:sticky; top:0; z-index:1000;
    }
    .container-narrow{ max-width:1240px; margin-inline:auto; }
    @media (min-width:992px){
      .topbar .container-narrow{ display:flex; align-items:center; }
      #navMain{ display:flex !important; align-items:center; flex:1 1 auto; }
    }
    .navbar-brand{ color:#fff; font-weight:800; letter-spacing:.2px; text-decoration:none; margin-right:var(--brand-gap); white-space:nowrap; }
    .navbar-brand i{ color:var(--gold); margin-right:.5rem; }
    .menu-nav{ gap:32px; margin-right:auto; }
    .navbar-dark .nav-link{ color:#eaf5f0; font-weight:700; padding:.5rem .9rem; border-radius:8px; display:inline-flex; align-items:center; gap:.4rem; }
    .navbar-dark .nav-link:hover{ background:#1a3f32; color:#fff; }
    .hdr-tray{ display:flex; align-items:center; gap:.6rem; margin-left:auto; }
    .hdr-search{ width:280px; }
    .hdr-search .input-group-text{ background:#eaf5f0; border-color:#d5ebe1; }
    .hdr-search input{ border-color:#d5ebe1; }
    .hdr-login{ background:linear-gradient(180deg,#ffd766,#f0c24d); color:#3b2b00; border:1px solid #e8bb44; font-weight:800; box-shadow:var(--shadow); white-space:nowrap; }

    /* 로그인 카드 */
    .auth-viewport{ display:grid; place-items:center; padding: 28px 16px 40px; }
    .auth-card{
      width:100%; max-width: 520px; background:#ffffffd9; backdrop-filter: blur(6px);
      border:1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .auth-head{
      padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px;
    }
    .auth-title{ font-weight:800; color:var(--green); margin:0; }
    .auth-body{ padding:20px; }
    .muted{ color:#5f7268; }
    .btn-primary{ background:linear-gradient(180deg,#2aa36f,#1f7a5b); border-color:#1f7a5b; font-weight:800; }
    .btn-primary:hover{ filter: brightness(1.02); }
    .brand-mini{ display:flex; align-items:center; gap:.5rem; color:#0f3d2e; font-weight:800; }
    .brand-mini i{ color:#c6971a; }

    /* 오류 박스(쿼리스트링 방식) */
    #loginError{ display:none; }
    #loginError.show{ display:block; }
  </style>
</head>
<body>

<!-- 상단바 -->
<nav class="topbar navbar navbar-expand-lg navbar-dark">
  <div class="container-narrow">
    <a class="navbar-brand" href="/"><i class="fa-solid fa-horse"></i> Edge Marker Racing</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav menu-nav mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/entries"><i class="fa-regular fa-clipboard"></i> 출전정보</a></li>
        <li class="nav-item"><a class="nav-link" href="/results"><i class="fa-regular fa-flag"></i> 경기결과</a></li>
        <li class="nav-item"><a class="nav-link" href="/horses"><i class="fa-solid fa-horse-head"></i> 경주마정보</a></li>
        <li class="nav-item"><a class="nav-link" href="/jockeys"><i class="fa-solid fa-user-ninja"></i> 기수정보</a></li>
      </ul>
      <div class="hdr-tray ms-lg-3">
        <form class="hdr-search d-none d-lg-block" onsubmit="return false;">
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
            <input class="form-control" type="search" placeholder="검색…" aria-label="검색">
          </div>
        </form>
        <a href="/login" class="btn hdr-login btn-sm"><i class="fa-solid fa-right-to-bracket"></i> 로그인</a>
      </div>
    </div>
  </div>
</nav>

<!-- 본문 -->
<div class="auth-viewport">
  <div class="auth-card">
    <div class="auth-head">
      <div class="brand-mini"><i class="fa-solid fa-horse"></i> Edge Marker</div>
      <h5 class="auth-title mb-0">로그인</h5>
    </div>
    <div class="auth-body">
      <p class="muted mb-3">Edge Marker Racing 계정으로 로그인하세요.</p>

      <!-- 에러 메시지 (템플릿 의존 없음) -->
      <div id="loginError" class="alert alert-warning py-2 mb-3"></div>

      <form method="post" action="/login" autocomplete="on">
        <div class="mb-3">
          <label for="uid" class="form-label">아이디</label>
          <input type="text" class="form-control" id="uid" name="uid" placeholder="아이디" required>
        </div>
        <div class="mb-3">
          <label for="upw" class="form-label">비밀번호</label>
          <input type="password" class="form-control" id="upw" name="upw" placeholder="비밀번호" required>
        </div>
        <div class="d-flex justify-content-between align-items-center">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberCheck" name="rememberCheck">
            <label class="form-check-label" for="rememberCheck">자동 로그인</label>
          </div>
          <button type="submit" class="btn btn-primary px-4">
            <i class="fa-solid fa-right-to-bracket me-1"></i> 로그인
          </button>
        </div>
      </form>

      <hr class="my-3">
      <div class="small muted">
        * 데모: <code>demo / demo</code><br>
        * DB 인증: Oracle <code>users</code> 테이블에 <code>userid/userpw</code>가 있으면 자동 인증됩니다.
      </div>
    </div>
  </div>
</div>

<footer class="py-4 text-center muted">© 2025 Edge Marker · All Rights Reserved</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // 쿼리스트링 ?err=... 로 전달된 에러를 표시
  (function(){
    const box = document.getElementById('loginError');
    const qs = new URLSearchParams(location.search);
    const err = qs.get('err');
    if (err) { box.textContent = decodeURIComponent(err); box.classList.add('show'); }
    else { box.classList.remove('show'); }
  })();
</script>
</body>
</html>
