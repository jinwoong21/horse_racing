<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>레이스결과 | Edge Marker Racing</title>

  <!-- Bootstrap / DataTables / Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/v/bs5/dt-2.0.7/fh-4.0.1/r-3.0.2/datatables.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

  <style>
    :root{
      --bg:#f7faf8; --ink:#0c1411;
      --green:#0f3d2e; --border:#e3ece7; --gold:#c6971a;
      --shadow:0 12px 26px rgba(7,25,18,.08);
      --row-gray:#f5f5f5;
    }
    body{ background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

    /* 상단바 (entries와 동일) */
    .topbar{ background:linear-gradient(90deg, var(--green), #0d3327); border-bottom:1px solid rgba(255,255,255,.08); color:#fff; position:sticky; top:0; z-index:1000; }
    .container-narrow{ max-width:1240px; margin-inline:auto; }
    @media (min-width: 992px){
      .topbar .container-narrow{ display:flex; align-items:center; }
      #navMain{ display:flex !important; align-items:center; flex:1 1 auto; }
    }
    .navbar-brand{ color:#fff; font-weight:800; text-decoration:none; margin-right:18px; white-space:nowrap;}
    .navbar-brand i{ color:#c6971a; margin-right:.5rem; }
    .menu-nav{ gap:32px; margin-right:auto; }
    .navbar-dark .nav-link{ color:#eaf5f0; font-weight:700; padding:.5rem .9rem; border-radius:8px; display:inline-flex; align-items:center; gap:.4rem; }
    .navbar-dark .nav-link:hover{ background:#1a3f32; color:#fff; }
    .navbar-dark .nav-link.active{ background:transparent; color:#fff; border:1px solid rgba(255,255,255,.35); box-shadow: inset 0 0 0 1px rgba(255,255,255,.08); }
    .hdr-tray{ display:flex; align-items:center; gap:.6rem; margin-left:auto; }
    .hdr-search{ width:280px; }
    .hdr-search .input-group-text{ background:#eaf5f0; border-color:#d5ebe1; }
    .hdr-search input{ border-color:#d5ebe1; }
    .hdr-login{ background:linear-gradient(180deg,#ffd766,#f0c24d); color:#3b2b00; border:1px solid #e8bb44; font-weight:800; box-shadow:var(--shadow); white-space:nowrap; }

    /* 패널 */
    .page-wrap{ padding:16px 0 24px; }
    .panel{ background:#fff; border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow); }
    .panel-header{ padding:14px 18px; border-bottom:1px solid var(--border); }
    .panel-body{ padding:16px 18px; }
    .page-title{ margin:0; font-weight:800; color:#0f3d2e; }

    /* 표 (entries와 동일 디자인) */
    .table-wrap{ max-width:980px; margin:0 auto; }
    #resultsTable{ table-layout:fixed; font-size:14.5px; }
    #resultsTable thead th, #resultsTable tbody td { text-align:center; }

    #resultsTable thead th{
      background:#245b3f; color:#fff;
      border-bottom:1px solid #1e4f37 !important;
      padding:.35rem .45rem; white-space:nowrap; font-size:15px;
    }
    #resultsTable tbody td{
      padding:.35rem .45rem; vertical-align:middle; border-color:#eceff2 !important;
    }

    /* 열 폭 */
    #resultsTable .col-no{ width:70px; }   /* 레이스번호 */
    #resultsTable .col-date{ width:110px; }/* 경기일자 */
    #resultsTable .col-dist{ width:80px; } /* 거리 */
    #resultsTable .col-rank{ width:70px; } /* 착순 */

    /* 줄무늬 */
    #resultsTable.dataTable tbody tr.row-white { background:#fff !important; }
    #resultsTable.dataTable tbody tr.row-gray  { background:var(--row-gray) !important; }
    #resultsTable.dataTable tbody tr:hover     { background:#eef1f3 !important; }

    /* 숫자 가독성 */
    .mono{ font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  </style>
</head>
<body>

<nav class="topbar navbar navbar-expand-lg navbar-dark">
  <div class="container-narrow">
    <a class="navbar-brand" href="/"><i class="fa-solid fa-horse"></i> Edge Marker Racing</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav menu-nav mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/entries"><i class="fa-regular fa-clipboard"></i> 출전정보</a></li>
        <li class="nav-item"><a class="nav-link active" href="/results"><i class="fa-regular fa-flag"></i> 레이스결과</a></li>
        <li class="nav-item"><a class="nav-link" href="/horses"><i class="fa-solid fa-horse-head"></i> 경주마정보</a></li>
        <li class="nav-item"><a class="nav-link" href="/jockeys"><i class="fa-solid fa-user-ninja"></i> 기수정보</a></li>
      </ul>

      <div class="hdr-tray ms-lg-3">
        <form class="hdr-search d-none d-lg-block" onsubmit="return false;">
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
            <input class="form-control" type="search" placeholder="검색…" aria-label="검색">
          </div>
        </form>
        <a href="/login" class="btn hdr-login btn-sm"><i class="fa-solid fa-right-to-bracket"></i> 로그인</a>
      </div>
    </div>
  </div>
</nav>

<div class="container-narrow page-wrap">
  <div class="panel">
    <div class="panel-header">
      <h3 class="page-title mb-1">레이스결과</h3>
    </div>
    <div class="panel-body">
      <div class="table-wrap">
        <div class="table-responsive">
          <table id="resultsTable" class="table table-sm align-middle w-100">
            <thead>
              <tr>
                <th class="col-no">레이스번호</th>
                <th class="col-date">경기일자</th>
                <th>레이스 이름</th>
                <th class="col-dist">거리</th>
                <th class="col-rank">착순</th>
                <th>말이름</th>
                <th>기수이름</th>
                <th>날씨</th>
                <th>잔디상태</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div><!-- /table-wrap -->
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/v/bs5/dt-2.0.7/fh-4.0.1/r-3.0.2/datatables.min.js"></script>

<script>
  $(function(){
    $('#resultsTable').DataTable({
      ajax: {
        url: '/api/raceday_results',
        cache: false,
        dataSrc: function(json){ return (json && json.data) ? json.data : []; }
      },
      columns: [
        { data:'레이스번호', className:'mono' },  // 1..12 (API에서 그룹 안 재부여)
        { data:'경기일자',   className:'mono' },
        { data:'레이스 이름' },
        { data:'거리',       className:'mono' },
        { data:'착순', className:'mono',
          render:(d,t)=> (t==='sort'||t==='type') ? (String(d).match(/\d+/)||[9999])[0] : d
         },
        { data:'말이름' },
        { data:'기수이름' },
        { data:'날씨' },
        { data:'잔디상태' }
      ],
      // ✅ 정렬 고정: 경기일자 ↓ → 레이스번호 ↑ → 착순 ↑
      order: [[1,'desc'], [2,'asc'], [0,'asc']],
      fixedHeader: true,
      responsive: true,
      pageLength: 12,
      lengthMenu: [[12, 25, 50, 100], [12, 25, 50, 100]],
      language: { url: "https://cdn.datatables.net/plug-ins/1.13.7/i18n/ko.json" },
      autoWidth:false,

      // 줄무늬 (entries와 동일)
      stripeClasses: [],
      rowCallback: function(row, data, displayNum, displayIndex){
        row.classList.remove('row-white','row-gray','odd','even');
        row.classList.add( (displayIndex % 2 === 0) ? 'row-white' : 'row-gray' );
      }
    });
  });
</script>
</body>
</html>
