<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>기수정보 | Edge Marker Racing</title>

  <!-- Bootstrap / DataTables / Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/v/bs5/dt-2.0.7/fh-4.0.1/r-3.0.2/datatables.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

  <style>
    :root{
      --bg:#f7faf8; --ink:#0c1411;
      --green:#0f3d2e; --border:#e3ece7; --gold:#c6971a;
      --shadow:0 12px 26px rgba(7,25,18,.08);
      --row-gray:#f5f5f5;
    }
    body{ background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

    /* 상단바(페이지 기존 것 유지) */
    .topbar{ background:linear-gradient(90deg, #0f3d2e, #0d3327); border-bottom:1px solid rgba(255,255,255,.08); color:#fff; position:sticky; top:0; z-index:1000; }
    .container-narrow{ max-width:1240px; margin-inline:auto; }
    @media (min-width:992px){
      .topbar .container-narrow{ display:flex; align-items:center; }
      #navMain{ display:flex !important; align-items:center; flex:1 1 auto; }
    }
    .navbar-brand{ color:#fff; font-weight:800; text-decoration:none; margin-right:18px; white-space:nowrap; }
    .navbar-brand i{ color:#c6971a; }
    .menu-nav{ gap:32px; margin-right:auto; }
    .navbar-dark .nav-link{ color:#eaf5f0; font-weight:700; padding:.5rem .9rem; border-radius:8px; display:inline-flex; align-items:center; gap:.4rem; }
    .navbar-dark .nav-link:hover{ background:#1a3f32; color:#fff; }
    .navbar-dark .nav-link.active{ background:transparent; color:#fff; border:1px solid rgba(255,255,255,.35); box-shadow: inset 0 0 0 1px rgba(255,255,255,.08); }
    .hdr-tray{ display:flex; align-items:center; gap:.6rem; margin-left:auto; }
    .hdr-search{ width:280px; }
    .hdr-search .input-group-text{ background:#eaf5f0; border-color:#d5ebe1; }
    .hdr-search input{ border-color:#d5ebe1; }
    .hdr-login{ background:linear-gradient(180deg,#ffd766,#f0c24d); color:#3b2b00; border:1px solid #e8bb44; font-weight:800; white-space:nowrap; }

    .page-wrap{ padding:16px 0 24px; }
    .panel{ background:#fff; border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow); }
    .panel-header{ padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .panel-body{ padding:16px 18px; }
    .page-title{ margin:0; font-weight:800; color:#0f3d2e; }

    /* ✅ results.html 과 동일한 테이블 룩 & 간격 */
    .table-wrap{ max-width:980px; margin:0 auto; }
    #jockeysTable{ table-layout:fixed; font-size:14.5px; }
    #jockeysTable thead th, #jockeysTable tbody td { text-align:center; }

    #jockeysTable thead th{
      background:#245b3f; color:#fff;
      border-bottom:1px solid #1e4f37 !important;
      padding:.35rem .45rem; white-space:nowrap; font-size:15px;
    }
    #jockeysTable tbody td{
      padding:.35rem .45rem; vertical-align:middle; border-color:#eceff2 !important;
    }

    /* 열 폭(필요한 곳만 고정) */
    #jockeysTable .col-order { width:70px; }     /* 순 */
    #jockeysTable .col-date  { width:110px; }    /* 데뷔일자 */
    #jockeysTable .col-wt    { width:110px; }    /* 기승가능중량 */

    /* 줄무늬 */
    #jockeysTable.dataTable tbody tr.row-white { background:#fff !important; }
    #jockeysTable.dataTable tbody tr.row-gray  { background:var(--row-gray) !important; }
    #jockeysTable.dataTable tbody tr:hover     { background:#eef1f3 !important; }

    /* 숫자 가독성 (모노 폰트) */
    .mono{ font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  </style>
</head>
<body>

<!-- 상단바(기존 유지) -->
<nav class="topbar navbar navbar-expand-lg navbar-dark">
  <div class="container-narrow">
    <a class="navbar-brand" href="/"><i class="fa-solid fa-horse me-2"></i> Edge Marker Racing</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain"><span class="navbar-toggler-icon"></span></button>

    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav menu-nav mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/entries"><i class="fa-regular fa-clipboard me-1"></i> 출전정보</a></li>
        <li class="nav-item"><a class="nav-link" href="/results"><i class="fa-regular fa-flag me-1"></i> 레이스결과</a></li>
        <li class="nav-item"><a class="nav-link" href="/horses"><i class="fa-solid fa-horse-head me-1"></i> 경주마정보</a></li>
        <li class="nav-item"><a class="nav-link active" href="/jockeys"><i class="fa-solid fa-user-ninja me-1"></i> 기수정보</a></li>
      </ul>
      <div class="hdr-tray ms-lg-3">
        <form class="hdr-search d-none d-lg-block" onsubmit="return false;">
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
            <input class="form-control" type="search" placeholder="검색…" aria-label="검색">
          </div>
        </form>
        <a href="/login" class="btn hdr-login btn-sm ms-2"><i class="fa-solid fa-right-to-bracket me-1"></i> 로그인</a>
      </div>
    </div>
  </div>
</nav>

<div class="container-narrow page-wrap">
  <div class="panel">
    <div class="panel-header">
      <h3 class="page-title"><i class="fa-solid fa-user-ninja"></i> 기수정보</h3>
    </div>
    <div class="panel-body">
      <div class="table-wrap">
        <div class="table-responsive">
          <table id="jockeysTable" class="table table-sm align-middle w-100">
            <thead>
              <tr>
                <th class="col-order">순</th>
                <th>기수명</th>
                <th class="col-date">데뷔일자</th>
                <th>최근1년전적</th>
                <th>통산전적</th>
                <th class="col-wt">기승가능중량</th>
                <th>비고</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.datatables.net/v/bs5/dt-2.0.7/fh-4.0.1/r-3.0.2/datatables.min.js"></script>

<script>
  $(function(){
    $('#jockeysTable').DataTable({
      ajax: { url: '/api/jockeys', cache:false, dataSrc: (json)=> (json && json.data) ? json.data : [] },
      columns: [
        { data:'순', className:'mono' },
        { data:'기수명',
          render:(d)=> `<a href="/jockeys/${encodeURIComponent(d)}" class="text-decoration-none fw-bold">${d||'-'}</a>` },
        { data:'데뷔일자', className:'mono' },
        { data:'최근1년전적', className:'mono' },
        { data:'통산전적',   className:'mono' },
        { data:'기승가능중량', className:'mono' },
        { data:'비고' }
      ],
      order: [[0,'asc']],
      fixedHeader:true, responsive:true, pageLength:25,
      language:{ url:"https://cdn.datatables.net/plug-ins/1.13.7/i18n/ko.json" },

      // ✅ results.html 과 동일 줄무늬
      stripeClasses: [],
      rowCallback: function(row, data, displayNum, displayIndex){
        row.classList.remove('row-white','row-gray','odd','even');
        row.classList.add( (displayIndex % 2 === 0) ? 'row-white' : 'row-gray' );
      }
    });
  });
</script>
</body>
</html>
