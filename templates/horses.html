<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>경주마정보 | Edge Marker Racing</title>

  <!-- Bootstrap / DataTables -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/v/bs5/dt-2.0.7/fh-4.0.1/r-3.0.2/datatables.min.css" rel="stylesheet"/>

  <style>
    :root{
      --bg:#f7faf8; --ink:#0c1411;
      --green:#0f3d2e; --border:#e3ece7; --gold:#c6971a;
      --shadow:0 12px 26px rgba(7,25,18,.08);
      --row-gray:#f5f5f5;
    }
    body{ background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

    /* 공통 상단바 */
     .topbar{
     background:linear-gradient(90deg,#0f3d2e,#0d3327);
     border-bottom:1px solid rgba(255,255,255,.08);
     color:#fff; position:sticky; top:0; z-index:1000;
    }
     .container-narrow{ max-width:1240px; margin-inline:auto; }

    /* 데스크톱 한 줄 정렬 */
    @media (min-width: 992px){
     .topbar .container-narrow{ display:flex; align-items:center; }
     #navMain{ display:flex !important; align-items:center; flex:1 1 auto; }
    }

    /* 브랜드/메뉴/검색/로그인 */
    .navbar-brand{ color:#fff; font-weight:800; text-decoration:none; margin-right:18px; white-space:nowrap;}
    .navbar-brand i{ color:#c6971a; }
    .menu-nav{ gap:32px; margin-right:auto; }
    .navbar-dark .nav-link{ color:#eaf5f0; font-weight:700; padding:.5rem .9rem; border-radius:8px; display:inline-flex; align-items:center; gap:.4rem; }
    .navbar-dark .nav-link:hover{ background:#1a3f32; color:#fff; }
    .navbar-dark .nav-link.active{ background:transparent; color:#fff; border:1px solid rgba(255,255,255,.35); box-shadow: inset 0 0 0 1px rgba(255,255,255,.08); }
    .hdr-tray{ display:flex; align-items:center; gap:.6rem; margin-left:auto; }
    .hdr-search{ width:280px; }
    .hdr-search .input-group-text{ background:#eaf5f0; border-color:#d5ebe1; }
    .hdr-search input{ border-color:#d5ebe1; }
    .hdr-login{ background:linear-gradient(180deg,#ffd766,#f0c24d); color:#3b2b00; border:1px solid #e8bb44; font-weight:800; white-space:nowrap; }


    /* 컨테이너 폭 */
    .container-narrow{ max-width:1240px; margin-inline:auto; }
    .navbar-brand{ color:#fff; font-weight:800; text-decoration:none; margin-right:18px; white-space:nowrap; }
    .navbar-brand i{ color:#c6971a; margin-right:.5rem; }
    .menu-nav{ gap:32px; margin-right:auto; }
    .navbar-dark .nav-link{ color:#eaf5f0; font-weight:700; padding:.5rem .9rem; border-radius:8px; display:inline-flex; align-items:center; gap:.4rem; }
    .navbar-dark .nav-link:hover{ background:#1a3f32; color:#fff; }
    .navbar-dark .nav-link.active{ background:transparent; color:#fff; border:1px solid rgba(255,255,255,.35); box-shadow: inset 0 0 0 1px rgba(255,255,255,.08); }
    .hdr-tray{ display:flex; align-items:center; gap:.6rem; margin-left:auto; }
    .hdr-search{ width:280px; }
    .hdr-search .input-group-text{ background:#eaf5f0; border-color:#d5ebe1; }
    .hdr-search input{ border-color:#d5ebe1; }
    .hdr-login{ background:linear-gradient(180deg,#ffd766,#f0c24d); color:#3b2b00; border:1px solid #e8bb44; font-weight:800; box-shadow:var(--shadow); white-space:nowrap; }

    .page-wrap{ padding:16px 0 24px; }
    .panel{ background:#fff; border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow); }
    .panel-header{ padding:14px 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .panel-body{ padding:16px 18px; }
    .page-title{ margin:0; font-weight:800; color:#0f3d2e; }

    /* ✅ entries/results와 동일한 테이블 스타일 */
    .table-wrap{ max-width:1240px; margin:0 auto; }
    #horsesTable{ table-layout:fixed; font-size:14.5px; }
    #horsesTable thead th, #horsesTable tbody td { text-align:center; }

    #horsesTable thead th{
      background:#245b3f; color:#fff;
      border-bottom:1px solid #1e4f37 !important;
      padding:.35rem .45rem; white-space:nowrap; font-size:15px;
    }
    #horsesTable tbody td{
      padding:.35rem .45rem; vertical-align:middle; border-color:#eceff2 !important;
    }

    /* 줄무늬 */
    #horsesTable.dataTable tbody tr.row-white { background:#fff !important; }
    #horsesTable.dataTable tbody tr.row-gray  { background:var(--row-gray) !important; }
    #horsesTable.dataTable tbody tr:hover     { background:#eef1f3 !important; }

    .horse-name { font-weight:800; color:#0f3d2e; text-decoration:none; }
    .horse-name:hover { text-decoration:underline; }
  </style>
</head>
<body>

<!-- ✅ 상단바 복원 (로고/메뉴/검색/로그인) -->
<!-- ✅ 공통 상단바: 로고/메뉴/검색/로그인 (entries 동일) -->
<nav class="topbar navbar navbar-expand-lg navbar-dark">
  <div class="container-narrow">
    <a class="navbar-brand d-flex align-items-center" href="/">
      <i class="fa-solid fa-horse me-2"></i> Edge Marker Racing
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav menu-nav mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="/entries">
            <i class="fa-regular fa-clipboard me-1"></i> 출전정보
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/results">
            <i class="fa-regular fa-flag me-1"></i> 레이스결과
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="/horses">
            <i class="fa-solid fa-horse-head me-1"></i> 경주마정보
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/jockeys">
            <i class="fa-solid fa-user-ninja me-1"></i> 기수정보
          </a>
        </li>
      </ul>

      <div class="hdr-tray ms-lg-3">
        <form class="hdr-search d-none d-lg-block" onsubmit="return false;">
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
            <input class="form-control" type="search" placeholder="검색…" aria-label="검색">
          </div>
        </form>
        <a href="/login" class="btn hdr-login btn-sm ms-2">
          <i class="fa-solid fa-right-to-bracket me-1"></i> 로그인
        </a>
      </div>
    </div>
  </div>
</nav>


<div class="container-narrow page-wrap">
  <div class="panel">
    <div class="panel-header">
      <h3 class="page-title"><i class="fa-solid fa-horse-head"></i> 경주마정보</h3>
      <div class="small text-muted">CSV를 집계하여 승률/상금/최근경주일을 한눈에 볼 수 있습니다.</div>
    </div>
    <div class="panel-body">
      <div class="table-wrap">
        <div class="table-responsive">
          <table id="horsesTable" class="table table-sm align-middle w-100">
            <thead>
              <tr>
                <th>말이름</th>
                <th>출전횟수</th>
                <th>1위횟수</th>
                <th>승률(%)</th>
                <th>총상금(₩)</th>
                <th>평균상금(₩)</th>
                <th>최근경주일</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.datatables.net/v/bs5/dt-2.0.7/fh-4.0.1/r-3.0.2/datatables.min.js"></script>

<script>
  $(function(){
    $('#horsesTable').DataTable({
      ajax: { url: '/api/horses', cache:false, dataSrc: (json)=> json && json.data ? json.data : [] },
      columns: [
        { data:'말이름',
          render:(d)=> `<a class="horse-name" href="/horses/${encodeURIComponent(d)}">${d}</a>` },
        { data:'출전횟수', className:'text-center', width:'90px' },
        { data:'1위횟수', className:'text-center', width:'90px' },
        { data:'승률(%)', className:'text-end', width:'90px',
          render:(v)=> v!=null? Number(v).toFixed(1)+'%' : '-' },
        { data:'총상금(₩)', className:'text-end',
          render:(v)=> v!=null? Number(v).toLocaleString() : '-' },
        { data:'평균상금(₩)', className:'text-end',
          render:(v)=> v!=null? Number(v).toLocaleString() : '-' },
        { data:'최근경주일', width:'110px' }
      ],
      order: [[4,'desc'], [3,'desc']],
      fixedHeader:true, responsive:true, pageLength:25,
      language:{ url:"https://cdn.datatables.net/plug-ins/1.13.7/i18n/ko.json" },

      /* entries/results와 동일 줄무늬 */
      stripeClasses: [],
      rowCallback: function(row, data, displayNum, displayIndex){
        row.classList.remove('row-white','row-gray','odd','even');
        row.classList.add( (displayIndex % 2 === 0) ? 'row-white' : 'row-gray' );
      }
    });
  });
</script>
</body>
</html>
